# Deploy the Vite app to GitHub Pages on each push to the main branch.
#
# One-time repo setup (Settings → Pages):
#   - Build and deployment: Source = "GitHub Actions" (not "Deploy from a branch")
#
# The site URL for a project page is:
#   https://<owner>.github.io/<repo>/
# VITE_BASE_PATH is set to /<repo>/ so assets and the client router work.

name: Deploy to GitHub Pages

on:
  push:
    # Change to your default branch (e.g. new-layout) if you do not use main.
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Must match the repo name segment in the GitHub Pages URL.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build:gh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
