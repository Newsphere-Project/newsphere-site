# Deploy the Vite app to GitHub Pages on each push to the main branch.
#
# One-time repo setup (Settings → Pages):
#   - Build and deployment: Source = "GitHub Actions" (not "Deploy from a branch")
#
# Base path: https://vite.dev/guide/build.html#public-base-path
#   - No CNAME: default project URL is https://<owner>.github.io/<repo>/ → base `/<repo>/`
#   - With CNAME (e.g. newsphere.site): the site is served at the *domain root* → base must be `/`
#     If you use `/<repo>/` here, JS/CSS requests 404 and the app stays a blank #root.

name: Deploy to GitHub Pages

on:
  push:
    # Change to your default branch (e.g. new-layout) if you do not use main.
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      # When this repo has a CNAME, GitHub Pages serves files at the custom domain
      # root (e.g. https://newsphere.site/assets/...), not at /<repo>/assets/...
      - name: Set Vite public base
        id: vite_base
        run: |
          if [ -f CNAME ]; then
            echo "Vite base: / (custom domain in CNAME — site is at domain root)"
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "Vite base: /${{ github.event.repository.name }}/ (github.io project page)"
            echo "value=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.vite_base.outputs.value }}
        run: npm run build:gh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
